<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subject Selection Practice</title>
  <link rel="stylesheet" href="mystyle.css" />
</head>
<body>

  <div class="container">
    <h1>Subject Selection Practice</h1>
    <p class="intro">
      Click a button to display information about a subject.
    </p>

    <div class="button-group">
      <button onclick="showSubject('networking')">Networking</button>
      <button onclick="showSubject('programming')">Programming</button>
      <button onclick="showSubject('data')">Data</button>
      <button onclick="showSubject('design')">Design</button>
    </div>

    <div class="output-box">
      <h2>Subject Information</h2>
     
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
